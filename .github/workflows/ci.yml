on: [push, pull_request]

name: CI

jobs:
  CI:
    name: Node 24 and npm
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://postgres:password@localhost:5432/test"
      SHOPIFY_API_KEY: "test_api_key"
      SHOPIFY_API_SECRET: "test_api_secret"
      SHOPIFY_APP_URL: "https://courtyard-checkout-rules.vercel.app"
      SCOPES: "read_delivery_customizations,write_delivery_customizations,read_metaobject_definitions,write_metaobject_definitions,read_metaobjects,write_metaobjects,read_products,read_validations,write_validations"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type checking
        if: ${{ !startsWith(github.head_ref || github.ref_name, 'javascript') }}
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

      - name: Validate Prisma schema
        run: npx prisma generate && npx prisma validate

      - name: Build application
        run: npx react-router build
