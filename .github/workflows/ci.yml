on: [push, pull_request]

name: CI

jobs:
  CI:
    name: Node ${{ matrix.node }} and ${{ matrix.manager }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20.19.0, 22, 24]
        manager: ['npm', 'yarn', 'pnpm']
    env:
      DATABASE_URL: "postgresql://postgres:password@localhost:5432/test"
      SHOPIFY_API_KEY: "test_api_key"
      SHOPIFY_API_SECRET: "test_api_secret"
      SHOPIFY_APP_URL: "https://courtyard-checkout-rules.vercel.app"
      SCOPES: "read_products,write_metafields"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node }}

      - name: Install pnpm
        if: ${{ matrix.manager == 'pnpm' }}
        uses: pnpm/action-setup@v6
        with:
          version: 8

      - name: Install dependencies using ${{ matrix.manager }}
        run: ${{ matrix.manager }} install

      - name: Run TypeScript type checking
        if: ${{ !startsWith(github.head_ref || github.ref_name, 'javascript') }}
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npm run lint

      - name: Validate Prisma schema
        run: npx prisma generate && npx prisma validate

      - name: Build application
        run: npm run build
