query CartValidationsGenerateRunInput {
  cart {
    attribute(key: "_courtyard_time") {
      value
    }
    lines {
      merchandise {
        ... on ProductVariant {
          product {
            # Shopify Functions do not expose arbitrary product tag lists.
            # This remains available only if Shopify adds tag-list support later.
            id
          }
        }
      }
    }
    deliveryGroups {
      deliveryAddress {
        zip
      }
    }
  }
  shop {
    metafield(namespace: "courtyard_checkout_rules", key: "published_config") {
      value
    }
  }
}
