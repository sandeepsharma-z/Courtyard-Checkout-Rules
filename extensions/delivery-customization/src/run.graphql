query RunInput {
  cart {
    timeAttr: attribute(key: "courtyard_time") {
      value
    }
    timeAttrLegacy: attribute(key: "_courtyard_time") {
      value
    }
    deliveryGroups {
      deliveryAddress {
        zip
      }
      deliveryOptions {
        handle
        title
        code
      }
    }
  }
  shop {
    metafield(namespace: "courtyard_checkout_rules", key: "published_config") {
      value
    }
  }
}
