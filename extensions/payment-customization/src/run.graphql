query RunInput {
  paymentMethods {
    id
    name
  }
  cart {
    deliveryGroups {
      deliveryAddress {
        zip
      }
      selectedDeliveryOption {
        title
      }
    }
  }
  shop {
    metafield(namespace: "courtyard_checkout_rules", key: "published_config") {
      value
    }
  }
}
